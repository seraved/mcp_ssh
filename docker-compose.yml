services:
  mcp-ssh:
    build: .
    image: mcp-ssh:latest
    container_name: mcp-ssh
    restart: unless-stopped
    ports:
      - "0.0.0.0:${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    volumes:
      - config:/config                   # hosts.yaml (named volume, writable)
      - /opt/mcp-ssh/keys:/keys:ro       # SSH private keys (key auth hosts)
      - /opt/mcp-ssh/data:/data          # audit.log (writable)
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"               # bind inside container; host sees only 127.0.0.1:8000
      MCP_PORT: "${MCP_PORT:-8000}"
      MCP_SSH_CONFIG: /config/hosts.yaml
      # --- Auth token (required, server refuses to start without it) ---
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN}"
      # --- SSH host credentials (names must match password_env in hosts.yaml) ---
      # ROUTER_PASS: "${ROUTER_PASS}"
      # CISCO_PASS: "${CISCO_PASS}"
      SVEN_PASS: "${SVEN_PASS}"
      MAIN_PASS: "${MAIN_PASS}"

  # -----------------------------------------------------------------------
  # Optional: nginx reverse proxy for external / TLS access
  # Uncomment the block below when the agent is on a different machine.
  # -----------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: mcp-ssh-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "8443:443"
  #   volumes:
  #     - /opt/mcp-ssh/nginx.conf:/etc/nginx/conf.d/mcp.conf:ro
  #     - /opt/mcp-ssh/certs:/etc/ssl/certs:ro
  #   depends_on:
  #     - mcp-ssh

volumes:
  config:
